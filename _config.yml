title: StudyCraft
description: Free & Premium Templates for Students — Resume, PDF, SVG, Image & More
url: ""
baseurl: ""

author: TyagiMultiTech
email: your@email.com

# Build
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  templates:
    output: true
    permalink: /template/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "templates"
    values:
      layout: "template"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md

# Google Sheets Config (change these)
google_sheet_id: "YOUR_GOOGLE_SHEET_ID"
google_script_url: "YOUR_APPS_SCRIPT_WEB_APP_URL"
